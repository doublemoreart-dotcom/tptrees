    <text x="206" y="34" fill="#174b3f" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans TC','PingFang TC','Microsoft JhengHei',Arial,sans-serif" font-size="23" font-weight="850">樹種科普</text>
    <text x="380" y="34" fill="#174b3f" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans TC','PingFang TC','Microsoft JhengHei',Arial,sans-serif" font-size="23" font-weight="850">今日一樹</text>

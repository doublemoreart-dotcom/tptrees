    <path fill="#bddc7a" d="M47.6 98.2c-14.5 0-23-6.8-23-17.7 0-12 10-19.6 25.6-19.6 13.1 0 22.7 6 27.6 17.3-6.8 13.1-16.5 20-30.2 20Zm76.8 0c-13.7 0-23.3-6.9-30.2-20 4.8-11.3 14.5-17.3 27.6-17.3 15.7 0 25.6 7.7 25.6 19.6 0 10.8-8.5 17.7-23 17.7Z"/>
  </g>
  <text x="126" y="154" fill="#b96444" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans TC','PingFang TC','Microsoft JhengHei',Arial,sans-serif" font-size="28" font-weight="800">臺北市行道樹小幫手</text>
  <text x="126" y="254" fill="#fffdf7" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans TC','PingFang TC','Microsoft JhengHei',Arial,sans-serif" font-size="78" font-weight="900">找到它・看懂它</text>
  <text x="126" y="344" fill="#fffdf7" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans TC','PingFang TC','Microsoft JhengHei',Arial,sans-serif" font-size="78" font-weight="900">知道缺口</text>
  <text x="126" y="426" fill="#d9dfd8" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans TC','PingFang TC','Microsoft JhengHei',Arial,sans-serif" font-size="32" font-weight="700">從臺北市行道樹公開資料開始，查位置、樹種、尺寸與資料狀態。</text>
  <g transform="translate(126 480)">
    <rect x="0" y="0" width="158" height="50" rx="25" fill="#e7f0e7"/>
    <rect x="174" y="0" width="158" height="50" rx="25" fill="#e7f0e7"/>
